services:
  api-prod:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${API_ENV_FILE:-./.env.docker.prod}
    environment:
      NODE_ENV: production
    network_mode: "host"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "prefix=\"$${API_PREFIX:-api/v1}\"; prefix=\"$${prefix#/}\"; wget -qO- http://127.0.0.1:$${API_PORT:-3002}/$${prefix}/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
