version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gopass_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gopass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gopass_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gopass_pm}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gopass}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gopass_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: gopass_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:3001/api/v1/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 8

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: gopass_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
  redis_data:
