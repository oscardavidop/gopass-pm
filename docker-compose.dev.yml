version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gopass_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: gopass
      POSTGRES_PASSWORD: gopass_secret
      POSTGRES_DB: gopass_pm
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gopass']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gopass_redis_dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
